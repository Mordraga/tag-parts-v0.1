name: Build Android APK

on:
  push:
    branches: [main]
    tags: 
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: my-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('my-app/package-lock.json') }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Install dependencies
        working-directory: my-app
        run: npm install

      - name: Build web assets
        working-directory: my-app
        run: npm run build

      - name: Sync Capacitor
        working-directory: my-app
        run: npx cap sync android

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required Android SDK components
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        working-directory: my-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: my-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inner-parts-${{ github.run_number }}
          path: my-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Package with Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: my-app/android/app/build/outputs/apk/debug/app-debug.apk