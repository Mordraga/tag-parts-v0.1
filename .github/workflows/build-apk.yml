name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version tag
        if: github.ref == 'refs/heads/main'
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: inner-parts-app/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('inner-parts-app/package-lock.json') }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Install dependencies
        working-directory: inner-parts-app
        run: npm install

      - name: Build city dataset
        working-directory: inner-parts-app
        run: npm run build:cities

      - name: Build web assets
        working-directory: inner-parts-app
        run: npm run build

      - name: Sync Capacitor
        working-directory: inner-parts-app
        run: npx cap sync android

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required Android SDK components
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        working-directory: inner-parts-app/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: inner-parts-app/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename debug APK
        if: steps.tag_version.outputs.new_tag != ''
        run: mv inner-parts-app/android/app/build/outputs/apk/debug/app-debug.apk inner-parts-app/android/app/build/outputs/apk/debug/inner-parts-${{ steps.tag_version.outputs.new_tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: inner-parts-${{ github.run_number }}
          path: inner-parts-app/android/app/build/outputs/apk/debug/${{ steps.tag_version.outputs.new_tag != '' && format('inner-parts-{0}.apk', steps.tag_version.outputs.new_tag) || 'app-debug.apk' }}
          retention-days: 30

      - name: Package with Release
        if: steps.tag_version.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          files: inner-parts-app/android/app/build/outputs/apk/debug/inner-parts-${{ steps.tag_version.outputs.new_tag }}.apk