<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Front Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/settings.js" type="module"></script>
</head>
<body>
  <h2>⚙️ Settings</h2>

  <div class="card settings-card">
    <h3>🧠 App Preferences</h3>
    <div class="row">
      <label for="darkModeToggle">Dark Mode</label>
      <input type="checkbox" id="darkModeToggle" />
    </div>

    <div class="row">
      <label for="timestampFormat">Timestamp Format</label>
      <select id="timestampFormat">
        <option value="12hr">12-Hour</option>
        <option value="24hr">24-Hour</option>
      </select>
    </div>
  </div>

  <div class="card settings-card">
    <h3>💾 Backup & Restore</h3>
    <p>Save everything or restore from a previous backup — no JSON needed.</p>
    <button id="backupAllBtn" class="btn-block">💾 Back Up Everything</button>
    <button id="restoreAllBtn" class="btn-block">📂 Restore from Backup</button>
    <input type="file" id="restoreAllInput" accept="application/json" class="sr-only" />
  </div>

  <div class="card settings-card">
    <h3>📋 Logs</h3>
    <button id="exportBtn">Export Logs</button>
    <button id="importLogsBtn">Import Logs</button>
    <input type="file" id="importLogsInput" accept="application/json" class="sr-only" />
    <button id="clearLogsBtn" class="danger">Clear Logs</button>
    <button id="toggleArchiveBtn">Show Archive</button>
    <div id="archiveContainer" class="archive-container hidden"></div>
  </div>

  <div class="card settings-card">
    <h3>🔔 Check-in Reminders</h3>
    <div class="reminder-slots">
      <button type="button" class="slot-btn" data-slot="morning">Morning</button>
      <button type="button" class="slot-btn" data-slot="afternoon">Afternoon</button>
      <button type="button" class="slot-btn" data-slot="evening">Evening</button>
    </div>
    <button type="button" id="reminder-toggle" class="reminder-enable-btn">Enable Notifications</button>
  </div>

  <button id="nav-toggle" aria-label="Toggle navigation">›</button>
  <nav>
    <a href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
    <a href="loggys.html"><span class="nav-icon">📜</span><span class="nav-label">Logs</span></a>
    <a href="parts.html"><span class="nav-icon">👥</span><span class="nav-label">Parts</span></a>
    <a href="messageBoard.html"><span class="nav-icon">💬</span><span class="nav-label">Threads</span></a>
    <a href="relationships.html"><span class="nav-icon">🔗</span><span class="nav-label">Bonds</span></a>
    <a href="journal.html"><span class="nav-icon">📓</span><span class="nav-label">Journal</span></a>
    <a href="analytics.html"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></a>
    <a href="Settings.html"><span class="nav-icon">⚙️</span><span class="nav-label">Options</span></a>
  </nav>
  <div id="nav-overlay"></div>

  <script type="module" src="js/settings.js"></script>
</body>
</html>
