<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Front Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');})();</script>
  <script src="js/settings.js" type="module"></script>
</head>
<body>

  <h2>📦 Who's Fronting?</h2>
  <div class="card">
    <div id="who-primary">
      <input class="who-input" placeholder="Who are you? (required)" />
    </div>
    <div id="cofronter-container" hidden></div>
    <button type="button" id="add-cofronter">+ Add co-fronter</button>
    <input id="where" placeholder="Where are you? (required)" />
    <input id="when" placeholder="What time is it? (required)" />
  
    <div class="log-entry">
      <label for="aware">How present do you feel? <span id="awarenessValue">5</span>/10</label>
      <div class="slider-row">
        <span class="slider-label">Distant</span>
        <input type="range" id="aware" name="awareness" min="1" max="10" value="5">
        <span class="slider-label">Fully here</span>
      </div>
    </div>

    <textarea id="msg" placeholder="Message (optional)"></textarea>
    <button id="log-btn">Log Entry</button>

    
    </div>
  
    <h3>📜 Recent Logs</h3>
  <div class="log-entry" id="logDisplay">
  </div>
  
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bn-secondary" id="bn-secondary">
      <a href="messageBoard.html" class="bn-item"><span class="bn-icon">💬</span><span class="bn-label">Threads</span></a>
      <a href="relationships.html" class="bn-item"><span class="bn-icon">🔗</span><span class="bn-label">Bonds</span></a>
      <a href="analytics.html" class="bn-item"><span class="bn-icon">📊</span><span class="bn-label">Stats</span></a>
      <a href="Settings.html" class="bn-item"><span class="bn-icon">⚙️</span><span class="bn-label">Options</span></a>
    </div>
    <div class="bn-primary">
      <a href="index.html" class="bn-item"><span class="bn-icon">🏠</span><span class="bn-label">Home</span></a>
      <a href="parts.html" class="bn-item"><span class="bn-icon">👥</span><span class="bn-label">Parts</span></a>
      <a href="loggys.html" class="bn-item"><span class="bn-icon">📜</span><span class="bn-label">Logs</span></a>
      <a href="journal.html" class="bn-item"><span class="bn-icon">📓</span><span class="bn-label">Journal</span></a>
      <button class="bn-item bn-more" id="bn-more" aria-label="More" aria-expanded="false"><span class="bn-icon">⋯</span><span class="bn-label">More</span></button>
    </div>
  </nav>

  <script type="module" src="js/index.js"></script>
  <script type="module">
    import { maybeShowOnboarding } from './js/onboarding.js';
    window.addEventListener('DOMContentLoaded', maybeShowOnboarding);
  </script>
  <div id="quick-log-root"></div>
  <script type="module" src="js/quickLog.js"></script>
</body>
</html>
