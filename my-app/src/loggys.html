<!DOCTYPE html>

<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Front Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
  <script>(function(){var t=localStorage.getItem('theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');})();</script>
  <script src="js/settings.js" type="module"></script>
</head>
<body>
  <h2>Logs Calendar</h2>

  <section class="log-filters">
    <div class="filter-row">
      <div class="filter-field">
        <label for="filterType">Filter By</label>
        <select id="filterType">
          <option value="">None</option>
          <option value="part">Part</option>
          <option value="date">Date Range</option>
          <option value="location">Location</option>
          <option value="keyword">Keyword</option>
          <option value="awareness">Awareness</option>
        </select>
      </div>
      <div id="filterControlContainer" class="filter-dynamic"></div>
      <button id="clearFilter" type="button" class="ghost filter-clear">Clear</button>
    </div>
    <div id="filterBadge" class="filter-badge hidden"></div>
    <p class="filter-note" id="filterSummary">Select a filter to highlight days with matching logs.</p>
    <datalist id="locationOptions"></datalist>
  </section>

  <section class="calendar-wrapper">
    <div class="calendar-header">
      <button id="prevMonth" aria-label="Previous month">&#8592;</button>
      <div class="calendar-title">
        <span id="calendarMonthLabel"></span>
        <button id="todayBtn" class="ghost">Today</button>
      </div>
      <button id="nextMonth" aria-label="Next month">&#8594;</button>
    </div>
    <div class="calendar-weekdays">
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </section>

  <section id="dayDetail" class="day-detail collapsed">
    <div class="day-detail-header">
      <h3 id="dayDetailLabel">Select a day</h3>
      <button id="closeDayDetail" class="ghost">Back to Calendar</button>
    </div>
    <div id="dayLogs" class="day-log-list">
      <p class="empty">Pick a date to see detailed logs.</p>
    </div>
  </section>
  
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bn-secondary" id="bn-secondary">
      <a href="messageBoard.html" class="bn-item"><span class="bn-icon">💬</span><span class="bn-label">Threads</span></a>
      <a href="relationships.html" class="bn-item"><span class="bn-icon">🔗</span><span class="bn-label">Bonds</span></a>
      <a href="analytics.html" class="bn-item"><span class="bn-icon">📊</span><span class="bn-label">Stats</span></a>
      <a href="Settings.html" class="bn-item"><span class="bn-icon">⚙️</span><span class="bn-label">Options</span></a>
    </div>
    <div class="bn-primary">
      <a href="index.html" class="bn-item"><span class="bn-icon">🏠</span><span class="bn-label">Home</span></a>
      <a href="parts.html" class="bn-item"><span class="bn-icon">👥</span><span class="bn-label">Parts</span></a>
      <a href="loggys.html" class="bn-item"><span class="bn-icon">📜</span><span class="bn-label">Logs</span></a>
      <a href="journal.html" class="bn-item"><span class="bn-icon">📓</span><span class="bn-label">Journal</span></a>
      <button class="bn-item bn-more" id="bn-more" aria-label="More" aria-expanded="false"><span class="bn-icon">⋯</span><span class="bn-label">More</span></button>
    </div>
  </nav>
  
  <script type="module" src="js/loggys.js"></script>
  <div id="quick-log-root"></div>
  <script type="module" src="js/quickLog.js"></script>
</body>
</html>
